services:
  app:
    build: .
    container_name: gofrocalor-api
    restart: unless-stopped
    ports:
      - "8095:8095"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8095/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

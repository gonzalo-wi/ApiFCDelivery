services:
  app1:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
    networks:
      - gofrocalor-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  app2:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
    networks:
      - gofrocalor-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8095:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - gofrocalor-network

networks:
  gofrocalor-network:
    driver: bridge

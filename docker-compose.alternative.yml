version: '3.8'

services:
  app:
    build: .
    container_name: gofrocalor-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    # Usar la red del host directamente
    network_mode: bridge
    # Añadir capacidades de red si es necesario
    cap_add:
      - NET_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # DNS personalizado si es necesario
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
